# .github/workflows/telegram-bot.yml

name: Telegram Bot Keep-alive / Periodic Task

on:
  schedule:
    - cron: '*/15 * * * *'          # every 15 minutes
  workflow_dispatch:                # can run manually

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot github3.py  # + whatever you need

      - name: Run bot (short polling)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          # Put other secrets here too (ADMIN_IDS can stay in code or use secrets)
        run: |
          # Option A: run polling for max ~5-9 minutes
          timeout 540 python your_bot_file.py

          # Option B: or just send one message / do one action
          # python your_bot_file.py --mode=send-once

      - name: Prevent GitHub from killing too fast (trick)
        if: always()
        run: echo "Workflow finished"
